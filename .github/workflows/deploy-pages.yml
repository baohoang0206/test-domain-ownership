name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# NOTE: Permissions required by the Pages deployment action
permissions:
  contents: read
  pages: write
  id-token: write

# NOTE: Allow one concurrent deployment; skip queued runs in favor of the latest
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stage static site
        run: |
          mkdir -p _site
          cp cv.html _site/index.html
          cp cv.html _site/cv.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
